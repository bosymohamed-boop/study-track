<body class="contact-us">
    <header>
        <h1>study track</h1>
    </header>
    <nav>
        <a href="personal-courses.html" target="_self">home</a>
        <a href="my-courses.html" target="_self">my courses</a>

    <main>
        <section>
            <h2>contact us</h2>
            <p>Contact us for any inquiry regarding the courses or educational content.</p>
            <p>Fill out the form and we will respond to you as soon as possible.</p>
        </section>
        <form>
            <article>
                <label>your name: </label>
                <input type="text" autofocus required placeholder="write your answer"/>
            </article>
            <article>
                <label>your email address: </label>
                <input type="email" autofocus required placeholder="write your answer" />
            </article>
            <article>
                <textarea name="notes" placeholder="write your message"></textarea>
            </article>
            <article>
                <button type="submit">send</button>
            </article>
        </form>
    </main>

</body>
