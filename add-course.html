<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" name="description" content="Organize your study… and keep everything under control"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>study track</title>
    <link rel="stylesheet" href="personal-courses.css"/>
</head>
<body class="add-course">
    <header>
        <h1>study track</h1>
    </header>
    <nav>
        <a href="personal-courses.html" target="_self">home</a>
        <a href="my-courses.html" target="_self">my courses</a>
        <a href="add-course.html" target="_self">add course</a>
        <a href="contact-us.html" target="_self">contact us</a>
    </nav>
    <h2>add course</h2>
    <form method="post">
        <article>
            <label>course name: </label>
            <input type="text" autofocus required placeholder="write your answer" name="course name"/>
        </article>
        <article>
            <label>instrutor: </label>
            <input type="text" required placeholder="write your answer" name="instrutor"/>
        </article>
        <article>
            <label>credit hours: </label>
            <select> 
                <option>2</option>
                <option>3</option>
            </select>
        </article>
        <article>
            <label class="note">notes: </label>
            <textarea name="notes" placeholder="write your answer"></textarea>
        </article>
        <article>
            <button type="submit">add</button>
        </article>
    </form>
    
</body>
</html>
